<!DOCTYPE html>
<html>
<head>
  <title>KDrama Game</title>
  <style>
    body {
      margin: 0;
      background: skyblue;
      overflow: hidden;
    }

    #player {
      width: 50px;
      height: 50px;
      background: purple;
      position: absolute;
      bottom: 50px;
      left: 50px;
    }

    .platform {
      width: 100px;
      height: 20px;
      background: black;
      position: absolute;
    }

    #controls {
      position: fixed;
      bottom: 10px;
      width: 100%;
      text-align: center;
    }

    button {
      font-size: 20px;
      padding: 15px;
      margin: 5px;
    }
  </style>
</head>

<body>

<div id="player"></div>

<div class="platform" style="bottom:0; left:0; width:100%;"></div>
<div class="platform" style="bottom:120px; left:200px;"></div>
<div class="platform" style="bottom:200px; left:400px;"></div>

<div id="controls">
  <button onclick="moveLeft()">⬅️</button>
  <button onclick="jump()">⬆️</button>
  <button onclick="moveRight()">➡️</button>
</div>

<script>
let player = document.getElementById("player");
let y = 50;
let velocity = 0;
let gravity = 0.5;
let jumping = false;

function moveRight() {
  player.style.left = (player.offsetLeft + 20) + "px";
}

function moveLeft() {
  player.style.left = (player.offsetLeft - 20) + "px";
}

function jump() {
  if (!jumping) {
    velocity = -10;
    jumping = true;
  }
}

function gameLoop() {
  velocity += gravity;
  y -= velocity;

  if (y <= 50) {
    y = 50;
    jumping = false;
  }

  player.style.bottom = y + "px";

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
